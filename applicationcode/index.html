<!DOCTYPE html>
<html>
<head>
  <title>Login Page</title>

    function login() {

    }
  </script>
</head>
<body>

  <h2>Login</h2>

  <form onsubmit="event.preventDefault(); login();">

      <tr>
        <td>Username:</td>
        <td><input type="text" value="Sushan" name="username" required></td>

      <tr>

          <button type="submit">Sign In</button>
        </td>
      </tr>
    </table>
  </form>

</body>
</html>
